<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando Documento...</title>
  <style>
    body {
      background-color: #030712;
      color: #94a3b8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .loader {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(249, 115, 22, 0.1);
      border-left-color: #f97316;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div id="status">Generando Hoja de Entrada...</div>

  <!-- CDN: jsPDF + AutoTable + QRious -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

  <!-- Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCLQKlAQNAnW2v5n5EdzDxW465a_Bgx8tU",
      authDomain: "anacleto-dcba8.firebaseapp.com",
      projectId: "anacleto-dcba8",
      storageBucket: "anacleto-dcba8.firebasestorage.app",
      messagingSenderId: "479401040293",
      appId: "1:479401040293:web:cc8bfaa40a23464a30704c"
    });
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const idParam = params.get('id');

    window.onload = function() {
      if (idParam) {
        fetchAndRedirect(idParam);
      } else {
        document.getElementById('status').textContent = 'Falta el identificador de la reparación';
        document.querySelector('.loader').style.display = 'none';
      }
    };

    async function fetchAndRedirect(id) {
      try {
        const docRef = await db.collection('reparaciones').doc(id).get();
        if (docRef.exists) {
          const order = { id: docRef.id, ...docRef.data() };
          
          let cl = null;
          if (order.clienteId) {
            const doc = await db.collection("clientes").doc(order.clienteId).get();
            if (doc.exists) cl = doc.data();
          }
          
          generateAndOpenPDF(order, cl);
        } else {
          document.getElementById('status').textContent = 'Documento no encontrado en el sistema';
          document.querySelector('.loader').style.display = 'none';
        }
      } catch (err) {
        console.error(err);
        document.getElementById('status').textContent = 'Error: ' + err.message;
        document.querySelector('.loader').style.display = 'none';
      }
    }

    function generateAndOpenPDF(o, cl) {
      try {
        var trackUrl = window.location.href; 
        var qrBase64 = null;
        try {
          var qr = new QRious({
            value: trackUrl,
            size: 150
          });
          qrBase64 = qr.toDataURL("image/jpeg");
        } catch(e) {
          console.error("Error al generar código QR local", e);
        }

        var pdf = new window.jspdf.jsPDF();
        var ac = [249, 115, 22], dk = [15, 23, 42], gr = [148, 163, 184], wh = [255, 255, 255], lb = [245, 247, 250];
        pdf.setFillColor(dk[0], dk[1], dk[2]); pdf.rect(0, 0, 210, 48, "F");
        pdf.setFillColor(ac[0], ac[1], ac[2]); pdf.rect(0, 45, 210, 3, "F");
        pdf.setFont("helvetica", "bold"); pdf.setFontSize(24); pdf.setTextColor(255, 255, 255); pdf.text("ANACLETO", 15, 22);
        pdf.setFontSize(9); pdf.setTextColor(ac[0], ac[1], ac[2]); pdf.text("VICENTE LARA SOLER - NIF: 48412185Z", 15, 30);
        pdf.setFontSize(7); pdf.setTextColor(gr[0], gr[1], gr[2]); pdf.text("Avenida cortes valencianas, n11 bajo", 15, 38); pdf.text("46980 Paterna (Valencia) - info@anacleto.com", 15, 42);
        pdf.setFillColor(ac[0], ac[1], ac[2]); pdf.roundedRect(130, 10, 65, 14, 2, 2, "F"); pdf.setFont("helvetica", "bold"); pdf.setFontSize(11); pdf.setTextColor(0, 0, 0); pdf.text("HOJA DE ENTRADA", 140, 19);
        pdf.setFontSize(8); pdf.setTextColor(gr[0], gr[1], gr[2]); pdf.text("No: " + o.id.slice(0, 10).toUpperCase(), 135, 32); pdf.text("Fecha: " + formatDate(o.fechaEntrada), 135, 38);
        var sl = { pendiente: "PENDIENTE", en_reparacion: "EN REPARACION", listo: "LISTO", entregado: "ENTREGADO" }; pdf.text("Estado: " + (sl[o.estado] || o.estado), 135, 42);
        var y = 58;
        pdf.setFillColor(lb[0], lb[1], lb[2]); pdf.roundedRect(15, y, 87, 45, 3, 3, "F"); pdf.setDrawColor(220, 225, 230); pdf.roundedRect(15, y, 87, 45, 3, 3, "S");
        pdf.setFontSize(7); pdf.setFont("helvetica", "bold"); pdf.setTextColor(ac[0], ac[1], ac[2]); pdf.text("DATOS DEL CLIENTE", 20, y + 8);
        pdf.setFontSize(11); pdf.setTextColor(30, 30, 30); pdf.setFont("helvetica", "bold"); pdf.text(truncStr(o.clienteNombre || "---", 28), 20, y + 17);
        pdf.setFont("helvetica", "normal"); pdf.setFontSize(8); pdf.setTextColor(80, 80, 80);
        if (cl && cl.telefono) {
          pdf.text("Tel: ", 20, y + 24);
          pdf.setFont("helvetica", "bold");
          pdf.text(cl.telefono, 28, y + 24);
        }
        
        pdf.setFillColor(lb[0], lb[1], lb[2]); pdf.roundedRect(108, y, 87, 45, 3, 3, "F"); pdf.setDrawColor(220, 225, 230); pdf.roundedRect(108, y, 87, 45, 3, 3, "S");
        pdf.setFontSize(7); pdf.setFont("helvetica", "bold"); pdf.setTextColor(ac[0], ac[1], ac[2]); pdf.text("DATOS DEL PATINETE", 113, y + 8);
        var pM = (o.patinete && o.patinete.marca) || "", pMo = (o.patinete && o.patinete.modelo) || "";
        pdf.setFontSize(11); pdf.setTextColor(30, 30, 30); pdf.setFont("helvetica", "bold"); pdf.text(pM + " " + pMo, 113, y + 17);
        pdf.setFont("helvetica", "normal"); pdf.setFontSize(8); pdf.setTextColor(80, 80, 80);
        pdf.text("Fecha Entrada: " + formatDate(o.fechaEntrada), 113, y + 24);
        y += 55;
        pdf.setFontSize(9); pdf.setFont("helvetica", "bold"); pdf.setTextColor(ac[0], ac[1], ac[2]); pdf.text("DIAGNOSTICO DE FALLOS", 15, y); y += 3;
        var fd = (o.fallos || []).map(function (f, i) { return [(i + 1).toString(), f.tipo, f.descripcion || "Sin descripcion", f.gravedad.toUpperCase()]; });
        if (fd.length > 0) { pdf.autoTable({ startY: y, head: [["#", "Componente", "Descripcion", "Gravedad"]], body: fd, margin: { left: 15, right: 15 }, theme: "grid", headStyles: { fillColor: dk, textColor: wh, fontStyle: "bold", fontSize: 7.5, cellPadding: 4 }, bodyStyles: { fontSize: 8, textColor: [50, 50, 50], cellPadding: 3.5 }, alternateRowStyles: { fillColor: lb }, columnStyles: { 0: { cellWidth: 10, halign: "center" }, 3: { cellWidth: 25, halign: "center" } } }); y = pdf.lastAutoTable.finalY + 8; }
        pdf.setFontSize(9); pdf.setFont("helvetica", "bold"); pdf.setTextColor(ac[0], ac[1], ac[2]); pdf.text("DESGLOSE DE COSTES", 15, y); y += 3;
        var cr = [];
        var pt = (o.piezasUsadas || []).reduce(function (s, p) { return s + (p.precio * p.cantidad); }, 0), lc = (parseFloat(o.costeTotal) || 0) - pt;
        
        (o.piezasUsadas || []).forEach(function (p) { cr.push(["Pieza: " + p.nombre, p.cantidad.toString(), "€" + p.precio.toFixed(2), "€" + (p.precio * p.cantidad).toFixed(2)]); });
        
        if (lc > 0) cr.push(["Mano de obra", "1", "€" + lc.toFixed(2), "€" + lc.toFixed(2)]);
        if (!cr.length) cr.push(["Servicio completo", "1", "€" + (o.costeTotal || 0).toFixed(2), "€" + (o.costeTotal || 0).toFixed(2)]);
        pdf.autoTable({ startY: y, head: [["Concepto", "Cant.","Precio Ud.","Subtotal"]], body: cr, margin: { left: 15, right: 15 }, theme: "grid", headStyles: { fillColor: dk, textColor: wh, fontStyle: "bold", fontSize: 7.5, cellPadding: 4 }, bodyStyles: { fontSize: 8, textColor: [50, 50, 50], cellPadding: 3.5 }, alternateRowStyles: { fillColor: lb }, columnStyles: { 1: { cellWidth: 15, halign: "center" }, 2: { cellWidth: 25, halign: "right" }, 3: { cellWidth: 25, halign: "right" } } });
        y = pdf.lastAutoTable.finalY + 2;
        var tci = parseFloat(o.costeTotal || 0), tsi = tci / 1.21, iva = tci - tsi;
        var pad = parseFloat(o.pagoAdelantado || 0), res = tci - pad;
        pdf.setFillColor(lb[0], lb[1], lb[2]); pdf.roundedRect(120, y, 75, 42, 3, 3, "F"); pdf.setDrawColor(220, 225, 230); pdf.roundedRect(120, y, 75, 42, 3, 3, "S");
        pdf.setFontSize(8); pdf.setFont("helvetica", "normal"); pdf.setTextColor(100, 100, 100);
        pdf.text("Base imponible:", 125, y + 8); pdf.text("€" + tsi.toFixed(2), 180, y + 8, { align: "right" });
        pdf.text("IVA (21%):", 125, y + 15); pdf.text("€" + iva.toFixed(2), 180, y + 15, { align: "right" });
        pdf.text("P. Adelantado:", 125, y + 22); pdf.text("-€" + pad.toFixed(2), 180, y + 22, { align: "right" });
        pdf.setDrawColor(ac[0], ac[1], ac[2]); pdf.line(125, y + 25, 190, y + 25);
        pdf.setFont("helvetica", "bold"); pdf.setFontSize(11); pdf.setTextColor(dk[0], dk[1], dk[2]); pdf.text("TOTAL:", 125, y + 31);
        pdf.setFontSize(14);
        pdf.text("€" + tci.toFixed(2), 190, y + 31, { align: "right" });
        pdf.setFontSize(12); pdf.setTextColor(ac[0], ac[1], ac[2]); pdf.text("Pte. Pagar:", 125, y + 38);
        pdf.text("€" + res.toFixed(2), 190, y + 38, { align: "right" });
        
        var ny = y + 45;
        pdf.setFillColor(ac[0], ac[1], ac[2]);
        pdf.roundedRect(15, ny, 22, 4, 1, 1, "F");
        pdf.setFontSize(6); pdf.setTextColor(255, 255, 255);
        pdf.text("IMPORTANTE", 17, ny + 3);
        
        pdf.setFontSize(7); pdf.setTextColor(dk[0], dk[1], dk[2]); pdf.setFont("helvetica", "bold");
        pdf.text("CONDICIONES DEL SERVICIO:", 40, ny + 3);
        
        pdf.setFont("helvetica", "normal"); pdf.setFontSize(6.5); pdf.setTextColor(80, 80, 80);
        var condText = "Una vez que el patinete haya sido reparado o se haya elaborado el presupuesto y comunicado al cliente, este dispondrá de un plazo de 2 días para proceder a su recogida. Transcurrido dicho plazo sin haber sido retirado, se aplicará un cargo de 5 € por día en concepto de almacenamiento o estancia.";
        var splitCond = pdf.splitTextToSize(condText, 180);
        pdf.text(splitCond, 15, ny + 8);
        
        y = ny + 8 + (splitCond.length * 3.5) + 6;
        if (o.garantia || o.notes || o.fechaSalida) {
          pdf.setFontSize(7); pdf.setFont("helvetica", "bold"); pdf.setTextColor(ac[0], ac[1], ac[2]); pdf.text("INFO ADICIONAL Y RECOMENDACIONES", 15, y); y += 5;
          pdf.setFont("helvetica", "normal"); pdf.setFontSize(8); pdf.setTextColor(80, 80, 80);
          if (o.garantia) {
            var lines = pdf.splitTextToSize("Recomendaciones: " + o.garantia, 180);
            pdf.text(lines, 15, y);
            y += (lines.length * 4.5);
          }
          if (o.fechaSalida) {
            pdf.text("Entrega Estimada: " + formatDate(o.fechaSalida), 15, y);
            y += 5;
          }
          if (o.notes) {
            var lines = pdf.splitTextToSize("Notas: " + o.notes, 180);
            pdf.text(lines, 15, y);
            y += (lines.length * 4.5);
          }
          y += 2;
        }
        y = Math.max(y + 6, 232); pdf.setDrawColor(200, 200, 200); pdf.setLineWidth(0.5); pdf.line(15, y, 90, y); pdf.line(120, y, 195, y);
        pdf.setFontSize(7); pdf.setFont("helvetica", "normal"); pdf.setTextColor(150, 150, 150);
        pdf.text("Firma del Cliente", 38, y + 6); pdf.text("Firma del Tecnico / Sello", 140, y + 6);
        
        if (qrBase64) {
          pdf.addImage(qrBase64, 'JPEG', 93, y - 17, 24, 24);
        }

        pdf.setFillColor(lb[0], lb[1], lb[2]); pdf.rect(0, 275, 210, 22, "F"); pdf.setDrawColor(ac[0], ac[1], ac[2]); pdf.line(0, 275, 210, 275);
        pdf.setFontSize(6); pdf.setTextColor(130, 130, 130); pdf.text("Cotizacion valida 30 dias. Piezas sustituidas quedan en propiedad del taller.", 15, 281);
        pdf.text("Documento generado por Anacleto Taller - " + new Date().getFullYear(), 15, 286);
        
        // Output as Blob and redirect nativelly
        const blob = pdf.output('blob');
        const blobUrl = URL.createObjectURL(blob);
        window.location.replace(blobUrl);
      } catch (err) {
        console.error("Error al generar PDF", err);
        document.getElementById('status').textContent = 'Error al generar el archivo PDF';
        document.querySelector('.loader').style.display = 'none';
      }
    }

    function formatDate(val) {
      if(!val) return "—";
      var d = val.toDate ? val.toDate() : new Date(val);
      if(isNaN(d.getTime())) return val;
      var datePart = d.toLocaleDateString("es-ES", {day:"2-digit", month:"short", year:"numeric", timeZone: "Europe/Madrid"});
      var timePart = d.toLocaleTimeString("es-ES", {hour: "2-digit", minute: "2-digit", timeZone: "Europe/Madrid"});
      return datePart + " " + timePart;
    }

    function truncStr(s, n) { if(!s) return "—"; n=n||30; return s.length>n?s.slice(0,n)+"...":s; }
  </script>
</body>
</html>
