<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Taller | Anacleto</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  
  <style>
    :root {
      --bg: #030712;
      --bg-card: #0f172a;
      --accent: #38bdf8;
      --accent2: #2dd4bf;
      --text: #f1f5f9;
      --text-dim: #64748b;
      --border: #1e293b;
      --danger: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 50px 50px; }
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: pulse 6s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: 3s; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.15;} 50%{transform:scale(1.1);opacity:.25;} }

    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 1rem;
    }

    .login-card {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(56,189,248,0.15);
      border-radius: 20px;
      padding: 3rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 1px rgba(56,189,248,0.2);
      animation: slideUp 0.6s ease;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:none} }

    .logo-area {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1.2rem;
      box-shadow: 0 10px 30px rgba(56,189,248,0.3);
    }
    .logo-area h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 3px;
      margin-bottom: 0.4rem;
    }
    .logo-area p {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 0.6rem;
    }
    input {
      width: 100%;
      padding: 0.9rem 1rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
    }
    input.error { border-color: var(--danger); }

    #error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #fca5a5;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #000;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.3s;
    }
    .btn-login:hover::before { background: rgba(255,255,255,0.15); }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(56,189,248,0.4); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-text { transition: opacity 0.3s; }
    .btn-loader { display: none; }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .btn-loader { display: inline; }

    .back-link {
      text-align: center;
      margin-top: 2rem;
    }
    .back-link a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.3s;
    }
    .back-link a:hover { color: var(--accent); }

    .info-note {
      margin-top: 1.5rem;
      background: rgba(56,189,248,0.05);
      border: 1px solid rgba(56,189,248,0.1);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: center;
    }
    .info-note strong { color: var(--accent); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="logo-area">
        <div class="logo-icon">⚡</div>
        <h1>ANACLETO</h1>
        <p>Panel de Reparaciones</p>
      </div>

      <div id="error-msg">⚠️ <span id="error-text">Error de autenticación</span></div>

      <div class="form-group">
        <label for="login-email">Correo electrónico</label>
        <input type="email" id="login-email" placeholder="tecnico@anacleto.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-pass">Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-login" id="btn-login" onclick="doLogin()">
        <span class="btn-text">Acceder al Panel</span>
        <span class="btn-loader">Verificando...</span>
      </button>

      <div class="info-note">
        Primera vez: crea un usuario en <strong>Firebase Console</strong> → Authentication → Add user
      </div>

      <div class="back-link">
        <a href="../index.html">← Volver a la tienda</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCLQKlAQNAnW2v5n5EdzDxW465a_Bgx8tU",
      authDomain: "anacleto-dcba8.firebaseapp.com",
      projectId: "anacleto-dcba8",
      storageBucket: "anacleto-dcba8.firebasestorage.app",
      messagingSenderId: "479401040293",
      appId: "1:479401040293:web:cc8bfaa40a23464a30704c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Si ya hay sesión activa, redirigir directamente
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'index.html';
    });

    const errMsg = document.getElementById('error-msg');
    const errText = document.getElementById('error-text');
    const btn = document.getElementById('btn-login');
    const emailInput = document.getElementById('login-email');
    const passInput = document.getElementById('login-pass');

    // Login con Enter
    [emailInput, passInput].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });

    window.doLogin = async () => {
      const email = emailInput.value.trim();
      const pass = passInput.value;

      errMsg.style.display = 'none';
      emailInput.classList.remove('error');
      passInput.classList.remove('error');

      if (!email) { emailInput.classList.add('error'); return; }
      if (!pass)  { passInput.classList.add('error'); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = 'index.html';
      } catch (err) {
        const msgs = {
          'auth/user-not-found':    'No existe ningún usuario con ese correo.',
          'auth/wrong-password':    'Contraseña incorrecta.',
          'auth/invalid-email':     'El correo no tiene el formato correcto.',
          'auth/too-many-requests': 'Demasiados intentos. Espera unos minutos.',
          'auth/invalid-credential':'Credenciales inválidas. Verifica email y contraseña.',
        };
        errText.textContent = msgs[err.code] || ('Error: ' + err.message);
        errMsg.style.display = 'block';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
